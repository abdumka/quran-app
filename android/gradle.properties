org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# Kotlin incremental compilation computes paths RELATIVE to the project dir.
# The pub cache lives on C: while this project is on D:, so for plugins with
# Kotlin sources (record_android) it hits
# "IllegalArgumentException: this and base files have different roots"
# inside RelocatableFileToPathConverter and kills the Kotlin daemon
# ("Daemon compilation failed: null"). Non-incremental builds skip that path
# conversion entirely. Costs some rebuild speed; correctness is unaffected.
kotlin.incremental=false
