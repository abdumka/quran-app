      <stop offset="100%" stop-color="#b68827"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7a5a14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg1)"/>
  <rect x="42" y="42" width="940" height="940" rx="26" fill="none" stroke="url(#gold1)" stroke-width="12"/>
  <rect x="84" y="84" width="856" height="856" rx="18" fill="none" stroke="url(#gold1)" stroke-width="4"/>

  <g opacity="0.45" stroke="#d9b957" fill="none">
