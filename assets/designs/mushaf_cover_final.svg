<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="paper" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fffceb"/>
      <stop offset="65%" stop-color="#f4e9bf"/>
      <stop offset="100%" stop-color="#e2cb7b"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a97814"/>
      <stop offset="50%" stop-color="#f6e08a"/>
      <stop offset="100%" stop-color="#8c6210"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#735412" flood-opacity="0.18"/>
    </filter>

  </defs>

  <rect width="1024" height="1024" fill="#f7f0d4"/>

  <circle cx="512" cy="512" r="446" fill="url(#paper)" stroke="url(#gold)" stroke-width="16"/>
  <circle cx="512" cy="512" r="408" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.9"/>
  <circle cx="512" cy="512" r="374" fill="none" stroke="#c59c34" stroke-width="1.8" opacity="0.7"/>

  <g opacity="0.32" stroke="#c9a84b" fill="none">
    <circle cx="512" cy="512" r="438" stroke-width="2"/>
    <circle cx="512" cy="512" r="390" stroke-width="1.4"/>
  </g>

  <g fill="none" stroke="#c8a349" opacity="0.65">
    <path d="M512 120c18 24 36 24 54 0c18 24 36 24 54 0c18 24 36 24 54 0" stroke-width="3.2"/>
    <path d="M350 170c24 18 48 18 72 0c24 18 48 18 72 0" stroke-width="2.4"/>
    <path d="M602 170c24 18 48 18 72 0c24 18 48 18 72 0" stroke-width="2.4"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="512" y="350" text-anchor="middle" direction="rtl"
      font-family="Amiri, 'Scheherazade New', serif" font-size="58" font-weight="700" fill="#2f2512">
      مُصْحَفُ الدَّعْوَةِ الإِسْلَامِيَّةِ الجَامِعُ
    </text>

    <text x="512" y="452" text-anchor="middle" direction="rtl"
      font-family="Amiri, 'Scheherazade New', serif" font-size="48" font-weight="700" fill="#5d4517">
      بِرِوَايَةِ الإِمَامِ قَالُونَ
    </text>

    <text x="512" y="542" text-anchor="middle" direction="rtl"
      font-family="Amiri, 'Scheherazade New', serif" font-size="42" font-weight="700" fill="#5d4517">
      وَالرَّسْمِ العُثْمَانِيِّ
    </text>

    <text x="512" y="650" text-anchor="middle" direction="rtl"
      font-family="Amiri, 'Scheherazade New', serif" font-size="38" font-weight="700" fill="#5a4318">
      عَلَى مَا اخْتَارَهُ الحَافِظُ أَبُو عَمْرٍو الدَّانِي
    </text>
  </g>

  <g fill="#b78d2f" opacity="0.55">
    <circle cx="512" cy="248" r="7"/>
    <circle cx="512" cy="772" r="7"/>
    <circle cx="248" cy="512" r="7"/>
    <circle cx="776" cy="512" r="7"/>
  </g>
</svg>
